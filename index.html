<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Jobs Portal</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/svg" href="logo.svg">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- ================== PRELOADER START ================== -->
    <div id="preloader" class="fixed inset-0 bg-white flex flex-col justify-center items-center z-50 transition-opacity duration-500">
        <!-- Logo Image -->
        <img src="logo.svg" alt="CG Jobs Logo" class="h-24 w-24 object-contain animate-bounce">
        <!-- Loading Text -->
        <p class="text-orange-600 font-bold mt-4 tracking-wider text-lg">Loading CG Jobs...</p>
    </div>
    <!-- ================== PRELOADER END ================== -->

    <!-- Header -->
    <header class="bg-orange-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center space-x-3">
                <img src="logo.svg" alt="CG Jobs Logo" class="h-10 w-10 object-contain rounded-full">
                <span class="text-2xl font-bold tracking-wide">CG Jobs Portal</span>
            </a>
            <button id="refreshBtn" class="bg-green-500 hover:bg-green-600 px-3 py-1.5 rounded text-sm font-semibold transition">
                🔄 Reload
            </button>
        </div>
    </header>

    <!-- Search Section -->
    <section class="bg-blue-900 text-white py-8 text-center px-4">
        <h2 class="text-3xl font-bold mb-4">Chhattisgarh Job Alert</h2>
        <p class="text-xs opacity-75 mb-3">Powered by Client-Side Fetching</p>
        <div class="max-w-md mx-auto">
            <input type="text" id="searchInput" placeholder="Search jobs (cg vyapam, ssc gd, cgpsc)..." class="w-full px-4 py-2 rounded-lg text-gray-800 shadow focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
    </section>

    <!-- Main Content Area -->
    <main class="container mx-auto px-4 py-8 flex-grow">
        <!-- Advertisement Banner Top -->
        <div class="flex justify-center mb-6">
            <script>
                atOptions = {
                    'key' : '54ffa6101c0b73831a25d2671364cca5',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script>
  atOptions = {
    'key' : '54ffa6101c0b73831a25d2671364cca5',
    'format' : 'iframe',
    'height' : 50,
    'width' : 320,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/54ffa6101c0b73831a25d2671364cca5/invoke.js"></script>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="text-center py-8">
            <div class="spinner inline-block w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-gray-500 mt-2">Fetching latest jobs, please wait...</p>
        </div>

        <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 hidden">
            
            <!-- Column 1: Jobs -->
            <div class="bg-white rounded-lg shadow p-5 border-t-4 border-orange-500">
                <h3 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">📢 Latest CG Jobs</h3>
                <div id="jobs-list" class="space-y-4">
                    <!-- JS will insert items here -->
                </div>
            </div>

            <!-- Column 2: Admit Cards -->
            <div class="bg-white rounded-lg shadow p-5 border-t-4 border-blue-500">
                <h3 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">💳 Admit Cards</h3>
                <div id="admits-list" class="space-y-4">
                    <!-- JS will insert items here -->
                </div>
            </div>

            <!-- Column 3: Results -->
            <div class="bg-white rounded-lg shadow p-5 border-t-4 border-green-500">
                <h3 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">🏆 Sarkari Results</h3>
                <div id="results-list" class="space-y-4">
                    <!-- JS will insert items here -->
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 text-center py-4 mt-8">
        <p class="text-xs">&copy; 2026 CG Jobs Portal (HTML/JS Version)</p>
    </footer>

    <!-- Ad Network Ads & Script -->
    <div class="flex justify-center my-4">

<div id="container-16744590e5745e39d8225c5c618d56fe"></div>
        <div id="container-16744590e5745e39d8225c5c618d56fe"></div>
    </div>
    
    <!-- Link to JS File -->
    <script src="script.js"></script>
</body>
    </html>
